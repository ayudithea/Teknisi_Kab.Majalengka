<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Teknisi Majalengka</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#1e3a8a,#0f172a);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{
    width:100%;
    max-width:400px;
    background:#1e293b;
    padding:30px 25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

h2{
    margin-bottom:5px;
}

.desc{
    font-size:14px;
    color:#cbd5e1;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.loading{
    display:none;
    margin-top:10px;
    font-size:13px;
    color:#93c5fd;
}
</style>
</head>

<body>

<div class="box">

<h2>🔐 Login Teknisi</h2>
<div class="desc">Akses khusus member teknisi Majalengka</div>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Masuk</button>

<div class="loading" id="loading">⏳ Sedang login...</div>

</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBrSk6ZyoxvKAEQFFkEHMT-PenWSSsFSdQ",
    authDomain: "ic-reference-teknisi.firebaseapp.com",
    projectId: "ic-reference-teknisi",
    storageBucket: "ic-reference-teknisi.appspot.com",
    messagingSenderId: "376962038194",
    appId: "1:376962038194:web:fa8475c2e097f5e0548cab"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const loading = document.getElementById("loading");

    if(email === "" || password === ""){
        alert("Isi email dan password dulu");
        return;
    }

    loading.style.display = "block";

    auth.signInWithEmailAndPassword(email, password)
    .then(()=>{
        // langsung ke form
        window.location.href = "https://forms.gle/2GLPHQdLkQJaTvnh7";
    })
    .catch(()=>{
        loading.style.display = "none";
        alert("Email atau password salah");
    });
}

// auto login
auth.onAuthStateChanged(user => {
    if(user){
        window.location.href = "https://forms.gle/2GLPHQdLkQJaTvnh7";
    }
});
</script>

</body>
</html>
