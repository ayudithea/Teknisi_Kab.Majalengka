<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Data Teknisi HP Majalengka</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f5f7fb}
header{background:#0d6efd;color:#fff;padding:18px;text-align:center}
#search{width:min(95%,600px);display:block;margin:15px auto;padding:12px;border-radius:8px;border:1px solid #ccc}
#info{text-align:center;color:#555;margin-bottom:10px}
#list{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;padding:15px}
.card{background:#fff;border-radius:12px;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.btn{display:inline-block;padding:8px 12px;margin:5px 5px 0 0;border-radius:8px;background:#0d6efd;color:#fff;text-decoration:none}
</style>
</head>
<body>
<header>
<h2>DATA TEKNISI HP MAJALENGKA</h2>
<p>Cari teknisi atau toko servis HP terdekat</p>
</header>

<input id="search" placeholder="Cari nama teknisi, toko, atau kecamatan...">
<div id="info">Memuat data...</div>
<div id="list"></div>

<script>
const SHEET_ID="1L-nQPy-WARtmODxQAJSWgJkc9ysmrlGRAdKd-8eBrpA";
const SHEET_NAME="DATA TEKNISI MAJALENGKA";
const url=`https://opensheet.elk.sh/${SHEET_ID}/${encodeURIComponent(SHEET_NAME)}`;

let data=[];

function render(rows){
 const list=document.getElementById("list");
 list.innerHTML="";
 document.getElementById("info").textContent=`Total Teknisi: ${rows.length}`;
 rows.forEach(r=>{
   const c=document.createElement("div");
   c.className="card";
   const wa=(r["No WA"]||r["WhatsApp"]||"").replace(/\D/g,"");
   const maps=r["Maps"]||r["Google Maps"]||"#";
   c.innerHTML=`
   <h3>${r["Nama Toko"]||"-"}</h3>
   <b>${r["Nama Teknisi"]||"-"}</b><br><br>
   <div>${r["Alamat"]||""}</div>
   <div>${r["Kecamatan"]||""}</div>
   ${wa?`<a class="btn" href="https://wa.me/62${wa.replace(/^0/,'')}" target="_blank">WhatsApp</a>`:""}
   ${maps!="#"?`<a class="btn" href="${maps}" target="_blank">Lokasi</a>`:""}
   `;
   list.appendChild(c);
 });
}

fetch(url)
.then(r=>r.json())
.then(j=>{data=j;render(data);})
.catch(()=>{
 document.getElementById("info").textContent="Gagal memuat data. Pastikan Google Sheet dibagikan ke publik.";
});

document.getElementById("search").addEventListener("input",e=>{
 const q=e.target.value.toLowerCase();
 render(data.filter(x=>JSON.stringify(x).toLowerCase().includes(q)));
});
</script>
</body>
</html>
