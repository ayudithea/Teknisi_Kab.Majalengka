<!DOCTYPE html>
<html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Data Teknisi Majalengka</title>
<style>
body{margin:0;font-family:Arial;background:#eef2f7}
header{background:#0b6ef3;color:#fff;padding:18px;text-align:center}
#q{display:block;width:min(94%,650px);margin:15px auto;padding:12px;border-radius:10px;border:1px solid #ccc}
#count{text-align:center;font-size:20px;margin:10px}
#cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;padding:15px}
.card{background:#fff;border-radius:12px;padding:15px;box-shadow:0 3px 10px rgba(0,0,0,.1)}
a.btn{display:inline-block;background:#0b6ef3;color:#fff;text-decoration:none;padding:8px 12px;border-radius:8px;margin-top:8px}
</style></head><body>
<header><h2>DATA TEKNISI HP MAJALENGKA</h2><p>Cari toko servis HP terdekat Anda</p></header>
<input id="q" placeholder="Cari nama toko, alamat...">
<div id="count">Memuat data...</div>
<div id="cards"></div>
<script>
const url="https://opensheet.elk.sh/1L-nQPy-WARtmODxQAJSWgJkc9ysmrlGRAdKd-8eBrpA/DATA%20TEKNISI%20MAJALENGKA";
let all=[];
function norm(r){
 const keys=Object.keys(r);
 return {
  nama:r[keys[0]]||"",
  alamat:r[keys[1]]||"",
  wa:r[keys[2]]||"",
  email:r[keys[3]]||""
 };
}
function render(arr){
cards.innerHTML="";
count.textContent="Total Teknisi: "+arr.length;
arr.forEach(x=>{
 let wa=x.wa;
 let link=wa.startsWith("http")?wa:(wa.includes("wa.me")?"https://"+wa:"https://wa.me/"+wa.replace(/\D/g,""));
 cards.innerHTML+=`<div class="card">
 <h3>${x.nama}</h3>
 <p>📍 ${x.alamat}</p>
 <p>📧 ${x.email}</p>
 <a class="btn" href="${link}" target="_blank">Chat WhatsApp</a>
 </div>`;
});
}
fetch(url).then(r=>r.json()).then(d=>{all=d.map(norm);render(all);}).catch(e=>count.textContent="Gagal memuat data. Pastikan sheet publik.");
q.oninput=()=>{let s=q.value.toLowerCase();render(all.filter(x=>(x.nama+x.alamat+x.email).toLowerCase().includes(s)))}
</script></body></html>
